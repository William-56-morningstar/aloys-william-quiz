<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ALOYS WILLIAM - Flag Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #22c55e;
      --secondary: #fbbf24;
      --background: #0f172a;
      --neon-blue: #38bdf8;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      color: white;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden;
    }
    .dev-banner {
      position: fixed; top: 0; width: 100%;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 0; text-align: center; z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .dev-name { font-size: 16px; font-weight: 800; text-shadow: 0 0 10px var(--neon-blue); }
    .dev-title { font-size: 10px; text-transform: uppercase; opacity: 0.6; display: block; }
    .app {
      margin-top: 60px; width: 90%; max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px); border-radius: 24px;
      padding: 25px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      text-align: center; border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .game-status {
      display: flex; justify-content: space-around; margin-bottom: 20px;
      background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px;
    }
    .flag-container {
      width: 100%; height: 140px; display: flex;
      justify-content: center; align-items: center; margin-bottom: 20px;
    }
    img {
      max-width: 90%; max-height: 100%; border-radius: 10px;
      border: 3px solid white; display: block;
    }
    input {
      width: calc(100% - 24px); padding: 12px; margin: 8px 0;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255, 255, 255, 0.05); color: white; outline: none;
    }
    button {
      width: 100%; padding: 14px; margin-top: 15px; border: none;
      border-radius: 10px; background: linear-gradient(135deg, var(--primary), #16a34a);
      color: white; font-weight: 700; cursor: pointer;
    }
    #feedback { min-height: 20px; margin-top: 15px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="dev-banner">
    <div class="dev-name">ALOYS WILLIAM</div>
    <div class="dev-title">Développeur Principal</div>
  </div>

  <div class="app">
    <h1>🌍 Flag Quiz</h1>
    <div class="game-status">
      <div style="color:var(--secondary)">⏱ <span id="time">10</span>s</div>
      <div>Score: <span id="score">0</span></div>
    </div>
    <div class="flag-container">
      <img id="flag" src="https://flagcdn.com/w320/cm.png" alt="chargement..." />
    </div>
    <input type="text" id="country" placeholder="Pays (ex: Cameroun)" />
    <input type="text" id="capital" placeholder="Capitale (ex: Yaoundé)" />
    <button onclick="checkAnswer()">Valider</button>
    <div id="feedback"></div>
  </div>

<script>
let countries = [];
let current = {};
let score = 0;
let time = 10;
let interval;

async function initGame() {
  document.getElementById("feedback").innerText = "Chargement...";
  try {
    // Utilisation d'une source de données plus stable
    const res = await fetch("https://restcountries.com/v3.1/all?fields=translations,capital,flags");
    countries = await res.json();
    document.getElementById("feedback").innerText = "";
    loadNewCountry();
  } catch (e) {
    document.getElementById("feedback").innerText = "Erreur réseau. Réessaie.";
  }
}

function startTimer() {
  clearInterval(interval);
  time = 10;
  document.getElementById("time").innerText = time;
  interval = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;
    if (time <= 0) {
      clearInterval(interval);
      document.getElementById("feedback").innerText = "⏰ Temps écoulé !";
      score = 0;
      document.getElementById("score").innerText = score;
      setTimeout(loadNewCountry, 1500);
    }
  }, 1000);
}

function loadNewCountry() {
  const countryInput = document.getElementById("country");
  const capitalInput = document.getElementById("capital");
  countryInput.value = ""; 
  capitalInput.value = "";
  
  let random;
  do {
    random = countries[Math.floor(Math.random() * countries.length)];
  } while (!random.flags || !random.translations.fra || !random.capital || !random.capital[0]);

  current = {
    name: random.translations.fra.common.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
    capital: random.capital[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
    flag: random.flags.png
  };

  document.getElementById("flag").src = current.flag;
  document.getElementById("feedback").innerText = "";
  startTimer();
}

function checkAnswer() {
  let uCountry = document.getElementById("country").value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  let uCapital = document.getElementById("capital").value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  if (uCountry === current.name && uCapital === current.capital) {
    clearInterval(interval);
    score++;
    document.getElementById("score").innerText = score;
    document.getElementById("feedback").innerHTML = "✔ Bravo !";
    document.getElementById("feedback").style.color = "#22c55e";
    setTimeout(loadNewCountry, 1000);
  } else {
    clearInterval(interval);
    document.getElementById("feedback").innerHTML = "❌ Faux ! C'était " + current.name;
    document.getElementById("feedback").style.color = "#ef4444";
    score = 0;
    document.getElementById("score").innerText = score;
    setTimeout(loadNewCountry, 2000);
  }
}

window.onload = initGame;
</script>
</body>
</html>
